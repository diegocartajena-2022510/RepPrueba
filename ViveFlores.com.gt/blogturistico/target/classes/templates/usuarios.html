<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="usuarios.css">
    <title>Usuarios</title>
</head>
<body>
    <header>
        <div class="logo">Vive Flores</div>
            <nav>
                <ul>
                    <li><a href="/Index/PaginaPrincipal.html">Inicio</a></li>
                    <li><a href="#">Categorias</a></li>
                    <li><a href="/Index/Eventos.html">Eventos</a></li>
                    <li><a href="/Index/Servicios.html">Servicios</a></li>
                    <li><a href="/Index/QuienesSomos.html">¿Quienes Somos?</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="btn-crud">
        <div class="agregar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-square" viewBox="0 0 16 16">
                <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"/>
                <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
            </svg>
            <a href="#" id="agregar">Agregar Usuario</a>
        </div>
        <div class="editar">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill" viewBox="0 0 16 16">
            <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
            </svg>
            <a href="#" id="editar">Editar Usuario</a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>id del usuario</th>
                <th>username</th>
                <th>nombre del usuario</th>
                <th>apellido del usuario</th>
                <th>email del usuario</th>
                <th>contarseña</th>
                <th>rol de usuario</th>
                <th>fecha del usuario</th>
                <th>editar/eliminar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u:${usuarios}">
                <td th:text="${u.id_usuario}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.nombre_usuario}"></td>
                <td th:text="${u.apellido_usuario}"></td>
                <td th:text="${u.email_usuario}"></td>
                <td th:text="${u.contrasena_usuario}"></td>
                <td th:text="${u.rol}"></td>
                <td th:text="${u.fecha_registro}"></td>
                <td>
                    <a class="btn-editar-tabla" >Editar</a>
                    <a class="btn-eliminar-tabla" onclick="return confirm('¿Seguro?')">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
